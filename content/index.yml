faq:
  title: Pokémon TCG FAQ
  description: Answers to common questions about collecting and opening Pokémon cards.

  categories:
    - title: Pokémon TCG Sets
      questions:
        - label: What is a Pokémon TCG set?
          content: |
            A Pokémon TCG set is a collection of cards released together as part of an expansion. Each set includes a mix of common cards, rare cards, and chase cards such as Secret Rares or Special Illustration Rares.

        - label: What are chase cards?
          content: |
            Chase cards are the most desirable cards in a set. They are typically rare cards with special artwork, alternate illustrations, or powerful competitive value.

        - label: How many cards are usually in a set?
          content: |
            Modern Pokémon sets typically contain between 180 and 270 cards including secret rares.

    - title: Opening Products
      questions:
        - label: What is the difference between a Booster Box and an Elite Trainer Box?
          content: |
            A Booster Box contains 36 booster packs and is usually the most efficient way to open large numbers of packs.

            An Elite Trainer Box contains fewer packs (usually 9) but includes accessories like sleeves, dice, and storage boxes.

        - label: Which Pokémon sets are best to open?
          content: |
            The best sets to open usually have popular Pokémon, valuable chase cards, or strong pull rates. TCG Nexus provides comparisons to help you decide which sets are worth opening.

        - label: Is opening packs profitable?
          content: |
            Opening packs is primarily for fun and collecting. While some rare cards can be very valuable, most packs will not return their purchase price. It's best to open packs for enjoyment rather than investment.
