about:
  title: "About TCG Nexus"
  description: |
    Pokémon TCG collecting has grown massively, but it can be difficult to know which sets, products, and cards are worth chasing.

    TCG Nexus was created to help collectors and players make better decisions before opening packs. Here you'll find Pokémon TCG set comparisons, product breakdowns, chase card guides, and insights into the trading card market.

    Whether you're a casual collector, competitive player, or long-term investor, TCG Nexus aims to give you the information you need to build your collection smarter.

